<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BizTrack Pro — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:ital,wght@0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyALqvZWOQvN9piT4_bG1Daj7yaZTDUVZ70",
    authDomain: "biztrack-pro-fa417.firebaseapp.com",
    projectId: "biztrack-pro-fa417",
    storageBucket: "biztrack-pro-fa417.firebasestorage.app",
    messagingSenderId: "284853442469",
    appId: "1:284853442469:web:83e14876ceaf07c53dfa4c"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  onAuthStateChanged(auth, user => {
    if (user) window.location.replace('index.html');
  });

  window.handleGoogle = async () => {
    try {
      setGoogleLoading(true);
      await signInWithPopup(auth, provider);
    } catch (e) {
      setGoogleLoading(false);
      showAlert(friendlyError(e.code));
    }
  };

  window.handleLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pw    = document.getElementById('loginPassword').value;
    if (!email || !pw) { showAlert('Please fill in all fields.'); shakeCard(); return; }
    setLoading('btnLogin', true);
    try {
      await signInWithEmailAndPassword(auth, email, pw);
    } catch (e) {
      setLoading('btnLogin', false);
      showAlert(friendlyError(e.code));
      shakeCard();
    }
  };

  window.handleSignup = async () => {
    const name  = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const pw    = document.getElementById('signupPassword').value;
    if (!name || !email || !pw) { showAlert('Please fill in all fields.'); shakeCard(); return; }
    if (pw.length < 8) { showAlert('Password must be at least 8 characters.'); shakeCard(); return; }
    setLoading('btnSignup', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pw);
      await updateProfile(cred.user, { displayName: name });
    } catch (e) {
      setLoading('btnSignup', false);
      showAlert(friendlyError(e.code));
      shakeCard();
    }
  };

  window.handleReset = async () => {
    const email = document.getElementById('resetEmail').value.trim();
    if (!email) { showResetAlert('Please enter your email.', 'error'); shakeCard(); return; }
    setLoading('btnReset', true);
    try {
      await sendPasswordResetEmail(auth, email);
      setLoading('btnReset', false);
      showResetAlert('Reset link sent! Check your inbox.', 'success');
    } catch (e) {
      setLoading('btnReset', false);
      showResetAlert(friendlyError(e.code), 'error');
      shakeCard();
    }
  };

  function friendlyError(code) {
    const map = {
      'auth/invalid-credential':     'Incorrect email or password.',
      'auth/user-not-found':         'No account found with this email.',
      'auth/wrong-password':         'Incorrect password.',
      'auth/email-already-in-use':   'An account with this email already exists.',
      'auth/weak-password':          'Password is too weak.',
      'auth/invalid-email':          'Please enter a valid email address.',
      'auth/too-many-requests':      'Too many attempts. Please wait and try again.',
      'auth/popup-closed-by-user':   'Sign-in cancelled.',
      'auth/network-request-failed': 'Network error. Check your connection.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d18;--s1:#0d1425;--s2:#111d35;--s3:#162040;
  --b1:#1c2d50;--b2:#243660;
  --t1:#e8eef8;--t2:#7a8eb0;--t3:#3d5070;
  --ac:#4f8ef7;--ac2:#f43f5e;--gr:#10b981;
  --ac-glow:rgba(79,142,247,0.3);
}
body{background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
.bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 15% 20%,rgba(79,142,247,0.12) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 85% 80%,rgba(99,102,241,0.1) 0%,transparent 60%)}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(79,142,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.04) 1px,transparent 1px);background-size:52px 52px}
.orb{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0;animation:orbFloat var(--dur,12s) ease-in-out infinite var(--delay,0s)}
.orb-1{width:380px;height:380px;background:#4f8ef7;top:-80px;left:-80px;opacity:.12;--dur:14s}
.orb-2{width:300px;height:300px;background:#6366f1;bottom:-60px;right:-60px;opacity:.1;--dur:11s;--delay:2s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(15px,-20px) scale(1.04)}66%{transform:translate(-12px,12px) scale(0.96)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 6px 24px rgba(79,142,247,0.4)}50%{box-shadow:0 6px 32px rgba(79,142,247,0.7)}}

.card{position:relative;z-index:1;width:100%;max-width:400px;background:var(--s1);border:1px solid var(--b1);border-radius:28px;padding:36px 32px 28px;box-shadow:0 0 0 1px rgba(79,142,247,0.06),0 32px 80px rgba(0,0,0,0.6);animation:fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both}
.card.shake{animation:shake 0.4s ease both}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.brand-logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(145deg,#4f8ef7,#6366f1);display:flex;align-items:center;justify-content:center;font-size:24px;animation:pulse 3s ease infinite;flex-shrink:0}
.brand-name{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--t1);line-height:1.1}
.brand-tag{font-size:10px;color:var(--t3);letter-spacing:.06em;margin-top:3px;font-family:'JetBrains Mono',monospace}
.tabs{display:flex;background:var(--s2);border:1px solid var(--b1);border-radius:14px;padding:4px;gap:3px;margin-bottom:24px}
.tab{flex:1;background:none;border:none;padding:9px;border-radius:11px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--t3);cursor:pointer;transition:all .18s}
.tab.active{background:var(--s1);color:var(--t1);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.panel{display:none}
.panel.active{display:block;animation:fadeUp 0.2s ease both}
.form-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--t1);margin-bottom:4px}
.form-sub{font-size:12.5px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.field{margin-bottom:14px}
.label{display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-family:'JetBrains Mono',monospace}
.input{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:11px 14px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--t1);outline:none;transition:border-color .15s,box-shadow .15s,background .15s}
.input::placeholder{color:var(--t3)}
.input:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--ac-glow);background:var(--s3)}
.pw-wrap{position:relative}
.pw-wrap .input{padding-right:44px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:2px;transition:color .12s}
.pw-eye:hover{color:var(--t2)}
.strength-bars{display:flex;gap:4px;margin-top:7px}
.s-bar{flex:1;height:3px;border-radius:99px;background:var(--b1);transition:background .3s}
.s-bar.w{background:#f43f5e}.s-bar.f{background:#f59e0b}.s-bar.g{background:#4f8ef7}.s-bar.s{background:#10b981}
.strength-label{font-size:10px;color:var(--t3);margin-top:4px;font-family:'JetBrains Mono',monospace}
.forgot{display:block;text-align:right;font-size:12px;color:var(--ac);cursor:pointer;margin-top:-6px;margin-bottom:18px;transition:opacity .12s;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0}
.forgot:hover{opacity:.7}
.alert{display:none;padding:10px 13px;border-radius:10px;font-size:12.5px;font-weight:500;line-height:1.5;margin-bottom:14px;gap:8px;animation:fadeUp .18s ease both}
.alert.error{display:flex;background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:#fca5b0}
.alert.success{display:flex;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:#6ee7b7}
.btn-submit{width:100%;background:linear-gradient(135deg,#4f8ef7,#6366f1);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;font-family:'DM Sans',sans-serif;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 20px rgba(79,142,247,0.35);transition:opacity .15s,transform .12s;margin-top:4px}
.btn-submit:hover{opacity:.9;transform:translateY(-1px)}
.btn-submit:active{transform:translateY(0)}
.btn-submit:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-submit .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
.btn-submit.loading .btn-lbl{display:none}
.btn-submit.loading .spinner{display:block}
.divider{display:flex;align-items:center;gap:10px;margin:18px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--b1)}
.divider span{font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.06em;font-family:'JetBrains Mono',monospace}
.btn-google{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:12px;font-size:13.5px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--t1);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .15s,background .15s,transform .12s;position:relative}
.btn-google:hover{border-color:var(--b2);background:var(--s3);transform:translateY(-1px)}
.btn-google:active{transform:translateY(0)}
.btn-google:disabled{opacity:.55;cursor:not-allowed}
.btn-google .g-spin{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:var(--t2);border-radius:50%;animation:spin .7s linear infinite;position:absolute;right:16px}
.btn-google.loading .g-spin{display:block}
.back-btn{background:none;border:none;color:var(--t3);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;padding:0;margin-bottom:18px;display:flex;align-items:center;gap:5px;transition:color .12s}
.back-btn:hover{color:var(--t2)}
.card-footer{text-align:center;margin-top:20px;font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:.04em}
.terms{font-size:11px;color:var(--t3);text-align:center;margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card" id="card">
  <div class="brand">
    <div class="brand-logo">📊</div>
    <div>
      <div class="brand-name">BizTrack Pro</div>
      <div class="brand-tag">BUSINESS INTELLIGENCE PLATFORM</div>
    </div>
  </div>

  <div id="mainAuth">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tabSignup" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div class="alert" id="alertBox"><span id="alertIcon">⚠️</span><span id="alertMsg"></span></div>

    <!-- LOGIN -->
    <div class="panel active" id="panelLogin">
      <div class="form-title">Welcome back</div>
      <div class="form-sub">Sign in to your BizTrack workspace</div>
      <div class="field">
        <label class="label">Email</label>
        <input type="email" class="input" id="loginEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label class="label">Password</label>
        <div class="pw-wrap">
          <input type="password" class="input" id="loginPassword" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pw-eye" onclick="togglePw('loginPassword',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="forgot" onclick="showReset()">Forgot password?</button>
      <button class="btn-submit" id="btnLogin" onclick="handleLogin()">
        <span class="btn-lbl">Sign In →</span><div class="spinner"></div>
      </button>
      <div class="divider"><span>or</span></div>
      <button class="btn-google" id="btnGoogle1" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
        <div class="g-spin"></div>
      </button>
    </div>

    <!-- SIGNUP -->
    <div class="panel" id="panelSignup">
      <div class="form-title">Start for free</div>
      <div class="form-sub">No credit card needed</div>
      <div class="field">
        <label class="label">Full Name</label>
        <input type="text" class="input" id="signupName" placeholder="Your name" autocomplete="name"/>
      </div>
      <div class="field">
        <label class="label">Email</label>
        <input type="email" class="input" id="signupEmail" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="field">
        <label class="label">Password</label>
        <div class="pw-wrap">
          <input type="password" class="input" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
          <button class="pw-eye" onclick="togglePw('signupPassword',this)" tabindex="-1">👁</button>
        </div>
        <div class="strength-bars">
          <div class="s-bar" id="sb1"></div><div class="s-bar" id="sb2"></div>
          <div class="s-bar" id="sb3"></div><div class="s-bar" id="sb4"></div>
        </div>
        <div class="strength-label" id="slbl"></div>
      </div>
      <button class="btn-submit" id="btnSignup" onclick="handleSignup()">
        <span class="btn-lbl">Create Account →</span><div class="spinner"></div>
      </button>
      <div class="divider"><span>or</span></div>
      <button class="btn-google" id="btnGoogle2" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
        <div class="g-spin"></div>
      </button>
      <p class="terms">By signing up you agree to our Terms of Service</p>
    </div>
  </div>

  <!-- RESET -->
  <div id="resetPanel" style="display:none">
    <button class="back-btn" onclick="showMain()">← Back to sign in</button>
    <div class="form-title">Reset password</div>
    <div class="form-sub">We'll send a reset link to your email</div>
    <div class="alert" id="resetAlert"><span id="resetIcon">⚠️</span><span id="resetMsg"></span></div>
    <div class="field">
      <label class="label">Email</label>
      <input type="email" class="input" id="resetEmail" placeholder="you@example.com"/>
    </div>
    <button class="btn-submit" id="btnReset" onclick="handleReset()">
      <span class="btn-lbl">Send Reset Link →</span><div class="spinner"></div>
    </button>
  </div>

  <div class="card-footer">designed &amp; built by ayeshatofajjol</div>
</div>

<script>
function switchTab(tab) {
  ['Login','Signup'].forEach(t => {
    document.getElementById('tab'+t).classList.toggle('active', t.toLowerCase()===tab);
    document.getElementById('panel'+t).classList.toggle('active', t.toLowerCase()===tab);
  });
  clearAlert();
}
function showAlert(msg,type='error'){
  const b=document.getElementById('alertBox');
  b.className='alert '+type;
  document.getElementById('alertMsg').textContent=msg;
  document.getElementById('alertIcon').textContent=type==='error'?'⚠️':'✅';
}
function clearAlert(){document.getElementById('alertBox').className='alert';}
function showResetAlert(msg,type='error'){
  const b=document.getElementById('resetAlert');
  b.className='alert '+type;
  document.getElementById('resetMsg').textContent=msg;
  document.getElementById('resetIcon').textContent=type==='error'?'⚠️':'✅';
}
function setLoading(id,on){const b=document.getElementById(id);b.classList.toggle('loading',on);b.disabled=on;}
function setGoogleLoading(on){
  ['btnGoogle1','btnGoogle2'].forEach(id=>{
    const b=document.getElementById(id);if(b){b.classList.toggle('loading',on);b.disabled=on;}
  });
}
function shakeCard(){const c=document.getElementById('card');c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');setTimeout(()=>c.classList.remove('shake'),500);}
function togglePw(id,btn){const i=document.getElementById(id);i.type=i.type==='text'?'password':'text';btn.textContent=i.type==='text'?'🙈':'👁';}
function showReset(){document.getElementById('mainAuth').style.display='none';document.getElementById('resetPanel').style.display='block';}
function showMain(){document.getElementById('mainAuth').style.display='block';document.getElementById('resetPanel').style.display='none';}
function checkStrength(val){
  const bars=[1,2,3,4].map(i=>document.getElementById('sb'+i));
  bars.forEach(b=>b.className='s-bar');
  if(!val){document.getElementById('slbl').textContent='';return;}
  let s=0;
  if(val.length>=8)s++;if(/[A-Z]/.test(val))s++;if(/[0-9]/.test(val))s++;if(/[^A-Za-z0-9]/.test(val))s++;
  const cls=['w','f','g','s'],lbl=['Weak','Fair','Good','Strong 💪'];
  for(let i=0;i<s;i++)bars[i].classList.add(cls[s-1]);
  document.getElementById('slbl').textContent=lbl[s-1]||'';
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(document.getElementById('resetPanel').style.display!=='none'){handleReset();return;}
  document.getElementById('panelLogin').classList.contains('active')?handleLogin():handleSignup();
});
</script>
</body>
</html>
